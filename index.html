<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Car Controller</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="overlay">
        <div class="glass-panel">
            <div class="header">
                <div class="status-indicator"></div>
                <h1>Car Controller</h1>
            </div>
            <p>Connected to ESP32 car module</p>
        </div>
        
        <div class="glass-panel" style="margin-top: 16px; padding: 20px;">
            <h2 style="font-size: 1.1rem; color: #c9d1d9; margin-bottom: 16px; text-align: center; text-transform: uppercase;">Car Controls</h2>
            <div class="dpad">
                <div class="dpad-row">
                    <button id="btn-up" class="dpad-btn">W</button>
                </div>
                <div class="dpad-row">
                    <button id="btn-left" class="dpad-btn">A</button>
                    <button id="btn-down" class="dpad-btn">S</button>
                    <button id="btn-right" class="dpad-btn">D</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
